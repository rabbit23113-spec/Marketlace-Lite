      context: "."
      dockerfile: ./apps/notifications/Dockerfile
    ports: [ "12098:12098" ]
  payments_service:
    build:
      context: "."
      dockerfile: ./apps/payments/Dockerfile
    ports: [ "12099:12099" ]
  users_database:
    image: postgres
    ports: [ "5432:5432" ]
