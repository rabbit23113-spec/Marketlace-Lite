services:
  users_service:
    build:
      context: "."
      dockerfile: ./apps/users/Dockerfile
    ports: [ "12091:12091" ]
  carts_service:
    build:
      context: "."
      dockerfile: ./apps/carts/Dockerfile
    ports: [ "12092:12092" ]
  auth_service:
    build:
      context: "."
      dockerfile: ./apps/auth/Dockerfile
    ports: [ "12093:12093" ]
  brands_service:
    build:
      context: "."
      dockerfile: ./apps/brands/Dockerfile
    ports: [ "12094:12094" ]
  categories_service:
    build:
      context: "."
      dockerfile: ./apps/categories/Dockerfile
    ports: [ "12095:12095" ]
  products_service:
    build:
      context: "."
      dockerfile: ./apps/products/Dockerfile
    ports: [ "12096:12096" ]
  promotions_service:
